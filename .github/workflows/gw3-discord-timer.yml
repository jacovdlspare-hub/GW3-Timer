name: GW3 Discord Timer

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  post-countdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check official Guild Wars site and post countdown
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.GW3_DISCORD_WEBHOOK_URL }}
        run: node github-action-post.mjs
